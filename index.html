<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lottie Navbar Prototype</title>

  <script src="https://unpkg.com/lottie-web/build/player/lottie.min.js"></script>

  <style>
    :root{
      --nav-h: 88px;
      --icon: 26px;

      --activeColor: #2F7BFF;
      --inactiveColor: rgba(255,255,255,.55);

      --bg: #0b0b0c;
      --glassTop: rgba(24,24,27,.50);
      --glassBottom: rgba(16,16,18,.78);
      --stroke: rgba(255,255,255,.10);
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
    }

    .variant-label{
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: white;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      z-index: 1000;
      pointer-events: none;
    }

    .nav{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: var(--nav-h);
      padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(to bottom, var(--glassTop), var(--glassBottom));
      border-top: 1px solid var(--stroke);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .nav__row{
      height: 100%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
    }

    .tab{
      height: 100%;
      border-radius: 14px;
      display: grid;
      grid-template-rows: 40px 18px;
      align-content: center;
      justify-items: center;
      cursor: pointer;
      user-select: none;
    }

    .icon{
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      transform: translateZ(0);
    }

    .icon svg{
      width: var(--icon);
      height: var(--icon);
    }

    .label{
      font-size: 12px;
      line-height: 1;
      letter-spacing: .2px;
      margin-top: 2px;
      color: var(--inactiveColor);
      white-space: nowrap;
    }

    .tab[data-active="true"] .label{
      color: var(--activeColor);
      font-weight: 600;
    }

    .tab[data-active="false"] .icon { opacity: .50; }
    .tab[data-active="true"]  .icon { opacity: 1; }

    .tab:hover{ background: rgba(255,255,255,.04); }
    .tab:active{ background: rgba(255,255,255,.06); }
  </style>
</head>

<body>
  <div class="variant-label" id="variant-label"></div>

  <nav class="nav">
    <div class="nav__row">
      <div class="tab" data-key="flights" data-active="true">
        <div class="icon" id="icon-flights" aria-label="Авиабилеты"></div>
        <div class="label">Авиабилеты</div>
      </div>

      <div class="tab" data-key="hotels" data-active="false">
        <div class="icon" id="icon-hotels" aria-label="Отели"></div>
        <div class="label">Отели</div>
      </div>

      <div class="tab" data-key="experiences" data-active="false">
        <div class="icon" id="icon-experiences" aria-label="Впечатления"></div>
        <div class="label">Впечатления</div>
      </div>

      <div class="tab" data-key="favorites" data-active="false">
        <div class="icon" id="icon-favorites" aria-label="Избранное"></div>
        <div class="label">Избранное</div>
      </div>

      <div class="tab" data-key="profile" data-active="false">
        <div class="icon" id="icon-profile" aria-label="Профиль"></div>
        <div class="label">Профиль</div>
      </div>
    </div>
  </nav>

  <script>
    const params = new URLSearchParams(window.location.search);
    const variant = params.get("variant") || "default";

    const label = document.getElementById("variant-label");
    label.textContent = "Variant: " + variant.toUpperCase();

    const flightAnimationMap = {
      default: "lottie/Plane.json",
      a: "lottie/Plane-2.json",
      b: "lottie/Plane-3.json"
    };

    const flightPath = flightAnimationMap[variant] || flightAnimationMap.default;

    const ICONS = {
      flights:     { el: "icon-flights",     path: flightPath },
      hotels:      { el: "icon-hotels",      path: "lottie/Hotel.json" },
      experiences: { el: "icon-experiences", path: "lottie/Nutshell.json" },
      favorites:   { el: "icon-favorites",   path: "lottie/Heart.json" },
      profile:     { el: "icon-profile",     path: "lottie/Person.json" }
    };

    const animations = {};
    for (const [key, cfg] of Object.entries(ICONS)) {
      animations[key] = lottie.loadAnimation({
        container: document.getElementById(cfg.el),
        renderer: "svg",
        loop: false,
        autoplay: false,
        path: cfg.path,
        rendererSettings: { progressiveLoad: true }
      });
    }

    function resetToStart(key){
      const a = animations[key];
      if (!a) return;
      a.stop();
      a.goToAndStop(0, true);
    }

    function playActivate(key){
      const a = animations[key];
      if (!a) return;
      a.stop();
      a.goToAndStop(0, true);
      a.play();
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        const key = tab.dataset.key;

        document.querySelectorAll(".tab").forEach(t => t.dataset.active = "false");

        for (const k of Object.keys(animations)) {
          if (k !== key) resetToStart(k);
        }

        tab.dataset.active = "true";
        playActivate(key);
      });
    });
  </script>
</body>
</html>
